name: Test action

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  smoke-test:
    needs: [shellcheck, actionlint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run example playbook against latest image
        uses: ./
        with:
          playbook: examples/playbook.yml
          inventory: examples/inventory.ini
          image-tag: latest

      - name: Run example playbook against a pinned Ansible version
        uses: ./
        with:
          playbook: examples/playbook.yml
          inventory: examples/inventory.ini
          image-tag: '2.21-alpine-3.22'
          options: '-vv'
