name: "Docker Ansible"
description: "Run an Ansible playbook from a Docker-based GitHub Action"
author: "willhallonline"

branding:
  icon: "terminal"
  color: "blue"

inputs:
  playbook:
    description: "Path to the Ansible playbook to run"
    required: true
  inventory:
    description: "Inventory file/path passed to ansible-playbook -i"
    required: false
    default: "inventory"
  extra-args:
    description: "Additional plain ansible-playbook arguments (space-separated, no shell metacharacters/quoted values)"
    required: false
    default: ""

outputs:
  result:
    description: "Result of the ansible-playbook execution"

runs:
  using: "docker"
  image: "Dockerfile"
